<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">   
    <link rel="stylesheet" href="style.css">     
    <title>DGM Tech</title>
</head>
<body>
    <header>
        <nav>
            <ul>
                <div class="logo">
                    <li><img src="assets/img/logo.png" alt=""></li>
                </div>
                <li>
                    <a href="index.html"><button>Cadastrar Produtos</button></a>
                </li>
                <li>
                    <a href="estoque.html"><button>Ver estoque</button></a>
                </li>
                <li>
                    <a href="pesquisa.html"><button>Pesquisar Produtos</button></a>
                </li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="titulo">
            <h1>Cadastre ou remova um produto</h1>
        </div>
        <div class="btn-add" id="buttons-add-remove">
            <button value="adicionar" onclick="add()">Adicionar Produto</button>
            <button value="remover" onclick="remove()">Remover Produto</button>
        </div>
        <div class="box" id="caixa">
            <form action="add.php" method="post" class="acima" id="form-add">
                <h1>Adicionar Um Produto</h1>
                <input type="text" name="nome-produto" placeholder="Nome do Produto">
                <input type="number" name="quantidade" id="quantidade-produto" placeholder="Quantidade">
                <select name="categorias" id="categorias">
                    <option selected disabled value="categorias">Categorias</option>
                    <option value="processador">Processador</option>
                    <option value="placa-mae">Placa Mãe</option>
                    <option value="placa-video">Placa de video</option>
                    <option value="fonte">Fonte</option>
                    <option value="memoria-ram">Memoria Ram</option>
                    <option value="armazenamento">Armazenamento</option>
                </select>
                <select name="marca" id="marca">
                    <option selected disabled value="">Marca</option>
                    <option value="mancer">Mancer</option>
                    <option value="gigabyte">Gigabyte</option>
                    <option value="inter">Intel</option>
                    <option value="amd">AMD</option>
                    <option value="nvidia">Nvidia</option>
                    <option value="asus">Asus</option>
                    <option value="msi">MSI</option>
                    <option value="kingston">Kingston</option>
                    <option value="wd-green">WD Green</option>
                    <option value="adata">Adata</option>
                    <option value="xfx">XFX</option>
                    <option value="asrock">ASRock</option>
                    <option value="zotac">Zotac</option>
                    <option value="galax">Galax</option>
                    <option value="sapphire">Sapphire</option>
               </select>
               <select name="estado" id="estado">
                    <option selected disabled value="">Estado do produto</option>
                    <option value="Novo">Novo</option>
                    <option value="Usado">Usado</option>
                    <option value="Recondicionado">Recondicionado</option>
                </select>
                <input type="number" name="preco" placeholder="Adicione um Valor ao Produto">
                <div class="button-enviar">
                    <input type="submit" value="Enviar">
                </div>
                <button><a href="index.html">Cancelar</a></button>
            </form>    
        </div>    
        <div class="abaixo" id="form-remove">
            <h1>Remover produto</h1>
            <form method="get" action="rem.php">
                <input type="text" name="remproduto" placeholder="Nome do Produto">
                <div class="button-enviar">
                    <button type="submit">Enviar</button>
                </div>
                <button><a href="?remproduto">Cancelar</a></button>
            </form>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
