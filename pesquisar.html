
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DGM Tech - Pesquisar</title>
    <link rel="stylesheet" href="pesquisa.css">
</head>
<body>
    <header>
        <nav>
            <ul>
                <div class="logo">
                    <li><img src="assets/img/logo.png" alt=""></li>
                </div>
                <li>
                    <a href="index.html"><button>Cadastrar Produtos</button></a>
                </li>
                <li>
                    <a href="estoque.html"><button>Ver estoque</button></a>
                </li>
                <li>
                    <a href="pesquisar.html"><button>Pesquisar Produtos</button></a>
                </li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="titulo">
            <h1>Pesquisar</h1>
        </div>
        <div class="bar">
        <datalist></datalist>
        <input list="opcao" name="" id="pesquisa" placeholder="Pesquisar" oninput="AparecerCard()">
        
        <datalist id="opcao">
            <div>
                <option value="Processador">
            </div>
            <div>
                <option value="Placa-Mãe">
            </div>
            <div>
                <option value="Placa-de-Video">
            </div>
            <div>
                <option value="Armazenamento">
            </div>
            <div>
                <option value="Fonte">
            </div>
        </datalist> 
    </div>
        <div class="cards">
            <div class="card" id="processador">
                <p>Processador</p>    
                <img src="assets/img/processador.jpg" alt="">
                <p>Quantidade: 04</p>
            </div>
            <div class="card" id="placa-mae">
                <p>Placa mãe</p>    
                <img src="assets/img/placa-mae.jpg" alt="">
                <p>Quantidade: 03</p>
            </div>
            <div class="card" id="placa-video">
                <p>Placa de video</p>    
                <img src="assets/img/placa-video.jpg" alt="">
                <p>Quantidade: 06</p>
            </div>
            <div class="card" id="memoria-ram">
                <p>Memoria Ram</p>    
                <img src="assets/img/memoria-ram.webp" alt="">
                <p>Quantidade: 05</p>
            </div>
            <div class="card" id="armazenamento">
                <p>Armazenamento</p>    
                <img src="assets/img/ssd.avif" alt="">
                <p>Quantidade: 05</p>
            </div>
            <div class="card" id="fonte">
                <p>Fonte</p>    
                <img src="assets/img/fonte.jpg" alt="">
                <p>Quantidade: 05</p>
        </div>
    </main>
    
    <script src="pesquisa.js"></script>
</body>
</html>
